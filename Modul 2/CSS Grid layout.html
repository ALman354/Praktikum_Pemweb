<!DOCTYPE html>
<html>
<head>
<style>

.grid{
    display:grid;
    grid-template-columns:repeat(3,1fr);
    grid-template-rows:repeat(2,100px);
    gap:15px;
}

.item1{
    background:red;
    grid-column:1/3;
}

.item2{
    background:green;
}

.item3{
    background:blue;
}

.item4{
    background:orange;
}

.item5{
    background:purple;
}

.item6{
    background:pink;
}

.grid div{
    color:white;
    text-align:center;
    padding-top:40px;
}

</style>
</head>

<body>

<div class="grid">
<div class="item1">1</div>
<div class="item2">2</div>
<div class="item3">3</div>
<div class="item4">4</div>
<div class="item5">5</div>
<div class="item6">6</div>
</div>

</body>
</html>
